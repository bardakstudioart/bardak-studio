<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактор наклейки</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--k:#1D9E75;--kl:#E1F5EE;--k2:#0F6E56;--bg:#EDEDEA;--surface:#fff;--border:rgba(0,0,0,0.1);--text:#1A1A1A;--muted:#888}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOOLBAR */
.tb{background:#1A1A1A;color:#fff;padding:.6rem 1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.logo{font-family:'Unbounded',sans-serif;font-size:.8rem;font-weight:700}
.logo span{color:#9FE1CB}
.sep{width:1px;height:20px;background:rgba(255,255,255,0.2);flex-shrink:0}
.tbtn{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tbtn:hover{background:rgba(255,255,255,0.15)}
.tbtn.green{background:var(--k);border-color:var(--k)}
.sz-row{display:flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,0.7)}
.sz-row input{width:50px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:5px;padding:3px 6px;color:#fff;font-size:12px;font-family:Nunito,sans-serif;outline:none}

/* LAYOUT */
.ws{flex:1;display:flex;overflow:hidden}
.side{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.65rem}
.sh{font-family:'Unbounded',sans-serif;font-size:.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.fi{font-family:'Nunito',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;width:100%;outline:none;background:#fff;color:var(--text)}
.fi:focus{border-color:var(--k)}
.fl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.fitem{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:.4rem .65rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;transition:border-color .15s,background .15s}
.fitem:hover{border-color:var(--k);background:var(--kl)}
.fitem.on{border-color:var(--k);background:var(--kl);color:var(--k2)}
.props{display:flex;flex-direction:column;gap:6px}
.props.off{opacity:.4;pointer-events:none}
.row2{display:flex;gap:5px}
.row2 .fi{flex:1;min-width:0}
input[type=color]{width:34px;height:28px;border-radius:5px;border:1px solid var(--border);cursor:pointer;padding:2px;flex-shrink:0}
.abtn{display:flex;gap:4px}
.abtn button{flex:1;padding:4px;border-radius:5px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;transition:all .12s}
.abtn button:hover,.abtn button.on{background:var(--kl);border-color:var(--k)}

/* CANVAS AREA */
.cvwrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:2rem;background:#DDDDD8}
.cvbox{position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
#cv{display:block;position:relative;z-index:0}
#ol{position:absolute;top:0;left:0;z-index:1;overflow:hidden}

/* DRAG FIELDS */
.df{position:absolute;cursor:move;line-height:1.4;padding:1px 2px;white-space:pre-wrap;word-break:break-word}
.df:hover{outline:1px dashed rgba(29,158,117,0.5)}
.df.sel{outline:2px solid var(--k);background:rgba(29,158,117,0.06)}
</style>
</head>
<body>

<div class="tb">
  <div class="logo">Bardak <span>Studio</span> — Наклейка</div>
  <div class="sep"></div>
  <label class="tbtn">🖼 Фон<input type="file" accept="image/*" style="display:none" onchange="loadBg(this)"></label>
  <div class="sep"></div>
  <div class="sz-row">
    Ш:<input id="cw" type="number" value="150" min="50" max="500">мм
    В:<input id="ch" type="number" value="100" min="30" max="400">мм
    <button class="tbtn" onclick="applySize()">✓</button>
  </div>
  <div class="sep"></div>
  <button class="tbtn" onclick="saveTPL()">💾 Шаблон</button>
  <label class="tbtn">📂 Открыть<input type="file" accept=".json" style="display:none" onchange="loadTPL(this)"></label>
  <button class="tbtn green" onclick="doPrint()">🖨 Печать</button>
</div>

<div class="ws">
  <!-- SIDEBAR -->
  <div class="side">
    <div>
      <div class="sh" style="margin-bottom:6px">Поля</div>
      <div id="flist" style="display:flex;flex-direction:column;gap:4px"></div>
      <button class="tbtn" style="width:100%;margin-top:6px;color:var(--text);border-color:var(--border);justify-content:center" onclick="addCustom()">+ Своё поле</button>
    </div>

    <div>
      <div class="sh" style="margin-bottom:6px">Свойства</div>
      <div class="props off" id="props">
        <div>
          <div class="fl">Размер · Цвет · Начертание</div>
          <div class="row2">
            <input type="number" class="fi" id="p-sz" value="11" min="6" max="72" style="width:50px;flex:none" oninput="upd()">
            <input type="color" id="p-col" value="#1a1a1a" onchange="upd()">
            <select class="fi" id="p-wt" onchange="upd()">
              <option value="400">Normal</option>
              <option value="700">Bold</option>
            </select>
          </div>
        </div>
        <div>
          <div class="fl">Шрифт</div>
          <select class="fi" id="p-fn" onchange="upd()">
            <option>Nunito</option><option>Arial</option><option>Georgia</option>
            <option>Courier New</option><option>Unbounded</option>
          </select>
        </div>
        <div>
          <div class="fl">Выравнивание</div>
          <div class="abtn">
            <button id="al-left" onclick="setAlign('left')" class="on">⬅</button>
            <button id="al-center" onclick="setAlign('center')">↔</button>
            <button id="al-right" onclick="setAlign('right')">➡</button>
          </div>
        </div>
        <div>
          <div class="fl">Префикс строки</div>
          <input type="text" class="fi" id="p-pre" placeholder="[받는사람]: " oninput="upd()">
        </div>
        <button class="tbtn" style="color:#E24B4A;border-color:#E24B4A;background:#FCEBEB;width:100%;justify-content:center" onclick="delSel()">🗑 Удалить поле</button>
      </div>
    </div>

    <div>
      <div class="sh" style="margin-bottom:6px">Данные (предпросмотр)</div>
      <div class="fl">Отправитель</div>
      <textarea class="fi" id="pv-sender" rows="2" style="resize:none" oninput="renderOl()">KROPOT EKATERINA
경기도 안산시</textarea>
      <div class="fl" style="margin-top:5px">Получатель — Имя</div>
      <input class="fi" id="pv-name" value="Иванова Мария" oninput="renderOl()">
      <div class="fl" style="margin-top:5px">Телефон</div>
      <input class="fi" id="pv-phone" value="010-1234-5678" oninput="renderOl()">
      <div class="fl" style="margin-top:5px">Адрес</div>
      <textarea class="fi" id="pv-addr" rows="2" style="resize:none" oninput="renderOl()">서울시 강남구 테헤란로 123-45</textarea>
      <div class="fl" style="margin-top:5px">№ заказа</div>
      <input class="fi" id="pv-ord" value="BS-123456" oninput="renderOl()">
    </div>
  </div>

  <!-- CANVAS -->
  <div class="cvwrap" id="cvwrap">
    <div class="cvbox" id="cvbox">
      <canvas id="cv"></canvas>
      <div id="ol"></div>
    </div>
  </div>
</div>

<script>
var DPI = 3.78;
var bgImg = null;
var fields = [];
var selId = null;
var uid = 0;

var cv = document.getElementById('cv');
var ol = document.getElementById('ol');
var cvbox = document.getElementById('cvbox');

// ── SIZE ──────────────────────────────────────────────
function applySize(){
  var w = Math.round((parseFloat(document.getElementById('cw').value)||150) * DPI);
  var h = Math.round((parseFloat(document.getElementById('ch').value)||100) * DPI);
  cv.width = w; cv.height = h;
  cv.style.width = w+'px'; cv.style.height = h+'px';
  ol.style.width = w+'px'; ol.style.height = h+'px';
  cvbox.style.width = w+'px'; cvbox.style.height = h+'px';
  drawBg();
}

function drawBg(){
  var ctx = cv.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,cv.width,cv.height);
  if(bgImg) ctx.drawImage(bgImg,0,0,cv.width,cv.height);
}

function loadBg(input){
  var f = input.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(e){
    var img = new Image();
    img.onload = function(){ bgImg = img; drawBg(); };
    img.src = e.target.result;
  };
  r.readAsDataURL(f);
}

// ── FIELDS ────────────────────────────────────────────
function getData(){
  return {
    sender: document.getElementById('pv-sender').value,
    name:   document.getElementById('pv-name').value,
    phone:  document.getElementById('pv-phone').value,
    addr:   document.getElementById('pv-addr').value,
    order:  document.getElementById('pv-ord').value,
  };
}

function fieldText(f, data){
  var v = f.key ? (data[f.key]||f.def) : f.def;
  return (f.pre||'') + v;
}

function initFields(){
  var w = cv.width, h = cv.height;
  // Sender — top left
  fields.push({id:++uid, key:'sender', label:'Отправитель',   def:'KROPOT EKATERINA', pre:'[보내는 사람]\n', x:12, y:12, sz:10, col:'#555', wt:'400', fn:'Nunito', al:'left'});
  // Order num — top right
  fields.push({id:++uid, key:'order',  label:'№ заказа',      def:'BS-000000',         pre:'',               x:w-90, y:12, sz:8,  col:'#aaa', wt:'400', fn:'Nunito', al:'left'});
  // Recipient label
  var rx=Math.round(w*0.42), ry=Math.round(h*0.40);
  fields.push({id:++uid, key:null,     label:'Метка — получатель', def:'[받는 사람]',   pre:'',               x:rx, y:ry,    sz:9,  col:'#888', wt:'400', fn:'Nunito', al:'left'});
  fields.push({id:++uid, key:'name',   label:'Имя получателя', def:'Иванова Мария',    pre:'',               x:rx, y:ry+18, sz:14, col:'#111', wt:'700', fn:'Nunito', al:'left'});
  fields.push({id:++uid, key:'phone',  label:'Телефон',         def:'010-0000-0000',    pre:'',               x:rx, y:ry+38, sz:11, col:'#333', wt:'400', fn:'Nunito', al:'left'});
  fields.push({id:++uid, key:'addr',   label:'Адрес',           def:'서울시 강남구...', pre:'',               x:rx, y:ry+56, sz:10, col:'#444', wt:'400', fn:'Nunito', al:'left'});
  renderList(); renderOl();
}

function addCustom(){
  var lbl = prompt('Название поля:'); if(!lbl) return;
  var val = prompt('Текст:', '') || '';
  fields.push({id:++uid, key:null, label:lbl, def:val, pre:'', x:20, y:20, sz:11, col:'#1a1a1a', wt:'400', fn:'Nunito', al:'left'});
  renderList(); renderOl();
}

// ── SELECTION ─────────────────────────────────────────
function sel(id){
  selId = id;
  renderList();
  var f = fields.find(function(x){return x.id===id;});
  if(!f) return;
  var pr = document.getElementById('props');
  pr.classList.remove('off');
  document.getElementById('p-sz').value  = f.sz;
  document.getElementById('p-col').value = f.col;
  document.getElementById('p-wt').value  = f.wt;
  document.getElementById('p-fn').value  = f.fn;
  document.getElementById('p-pre').value = f.pre||'';
  ['left','center','right'].forEach(function(a){
    document.getElementById('al-'+a).classList.toggle('on', f.al===a);
  });
  // Re-render to show selection highlight
  renderOl();
}

function upd(){
  var f = fields.find(function(x){return x.id===selId;}); if(!f) return;
  f.sz  = parseInt(document.getElementById('p-sz').value)||11;
  f.col = document.getElementById('p-col').value;
  f.wt  = document.getElementById('p-wt').value;
  f.fn  = document.getElementById('p-fn').value;
  f.pre = document.getElementById('p-pre').value;
  renderOl();
}

function setAlign(a){
  var f = fields.find(function(x){return x.id===selId;}); if(!f) return;
  f.al = a;
  ['left','center','right'].forEach(function(aa){
    document.getElementById('al-'+aa).classList.toggle('on', aa===a);
  });
  renderOl();
}

function delSel(){
  if(!selId || !confirm('Удалить поле?')) return;
  fields = fields.filter(function(x){return x.id!==selId;});
  selId = null;
  document.getElementById('props').classList.add('off');
  renderList(); renderOl();
}

// ── RENDER LIST ───────────────────────────────────────
function renderList(){
  var el = document.getElementById('flist');
  el.innerHTML = '';
  fields.forEach(function(f){
    var d = document.createElement('div');
    d.className = 'fitem' + (f.id===selId?' on':'');
    d.textContent = f.label;
    d.onclick = function(){ sel(f.id); };
    el.appendChild(d);
  });
}

// ── RENDER OVERLAY ────────────────────────────────────
function renderOl(){
  ol.innerHTML = '';
  var data = getData();
  fields.forEach(function(f){
    var div = document.createElement('div');
    div.className = 'df' + (f.id===selId?' sel':'');
    div.style.left        = f.x + 'px';
    div.style.top         = f.y + 'px';
    div.style.fontSize    = f.sz + 'px';
    div.style.color       = f.col;
    div.style.fontWeight  = f.wt;
    div.style.fontFamily  = f.fn + ', sans-serif';
    div.style.textAlign   = f.al;
    div.textContent       = fieldText(f, data);

    // ── DRAG — mousedown + mousemove on document ──
    div.addEventListener('mousedown', function(e){
      if(e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      sel(f.id);

      var rect = div.getBoundingClientRect();
      var olRect = ol.getBoundingClientRect();
      var offX = e.clientX - rect.left;
      var offY = e.clientY - rect.top;

      div.style.cursor = 'grabbing';
      document.body.style.userSelect = 'none';

      function onMove(e){
        var nx = e.clientX - olRect.left - offX;
        var ny = e.clientY - olRect.top  - offY;
        f.x = Math.max(0, Math.min(cv.width  - 4, nx));
        f.y = Math.max(0, Math.min(cv.height - 4, ny));
        div.style.left = f.x + 'px';
        div.style.top  = f.y + 'px';
      }

      function onUp(){
        div.style.cursor = 'move';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        renderList();
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
    });

    // Touch support
    div.addEventListener('touchstart', function(e){
      e.preventDefault();
      e.stopPropagation();
      sel(f.id);

      var rect = div.getBoundingClientRect();
      var olRect = ol.getBoundingClientRect();
      var offX = e.touches[0].clientX - rect.left;
      var offY = e.touches[0].clientY - rect.top;

      function onMove(e){
        e.preventDefault();
        var t = e.touches[0];
        var nx = t.clientX - olRect.left - offX;
        var ny = t.clientY - olRect.top  - offY;
        f.x = Math.max(0, Math.min(cv.width  - 4, nx));
        f.y = Math.max(0, Math.min(cv.height - 4, ny));
        div.style.left = f.x + 'px';
        div.style.top  = f.y + 'px';
      }

      function onEnd(){
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend',  onEnd);
        renderList();
      }

      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend',  onEnd);
    }, {passive:false});

    ol.appendChild(div);
  });
}

// ── PRINT ─────────────────────────────────────────────
function doPrint(orderData){
  var data = orderData || getData();
  var pc  = document.createElement('canvas');
  pc.width  = cv.width;
  pc.height = cv.height;
  var ctx = pc.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,pc.width,pc.height);
  if(bgImg) ctx.drawImage(bgImg,0,0,pc.width,pc.height);

  fields.forEach(function(f){
    ctx.save();
    ctx.font      = f.wt+' '+f.sz+'px '+f.fn+',sans-serif';
    ctx.fillStyle = f.col;
    var txt   = fieldText(f, data);
    var lines = txt.split('\n');
    var ax    = f.al==='right'  ? f.x+200 :
                f.al==='center' ? f.x+100 : f.x;
    ctx.textAlign = f.al;
    lines.forEach(function(line, i){
      ctx.fillText(line, ax, f.y + f.sz + i * (f.sz * 1.4));
    });
    ctx.restore();
  });

  var url = pc.toDataURL('image/png');
  var win = window.open('','_blank');
  win.document.write('<!DOCTYPE html><html><head><title>Наклейка</title>'+
    '<style>@page{margin:0}body{margin:0}img{width:100%;display:block}</style></head><body>'+
    '<img src="'+url+'">'+
    '<scr'+'ipt>window.onload=function(){window.print();}<\/scr'+'ipt>'+
    '</body></html>');
  win.document.close();
}

window.printLabelForOrder = function(order){
  doPrint({
    sender: document.getElementById('pv-sender').value,
    name:  order.name||'',
    phone: order.phone||'',
    addr:  order.address||'',
    order: order.orderNum||''
  });
};

// ── SAVE / LOAD TEMPLATE ──────────────────────────────
function saveTPL(){
  var bgData = null;
  if(bgImg){
    var t = document.createElement('canvas');
    t.width=cv.width; t.height=cv.height;
    t.getContext('2d').drawImage(bgImg,0,0);
    bgData = t.toDataURL();
  }
  var tpl = {
    fields: fields,
    cw: document.getElementById('cw').value,
    ch: document.getElementById('ch').value,
    bg: bgData
  };
  var a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(tpl));
  a.download = 'label-template.json';
  a.click();
}

function loadTPL(input){
  var r = new FileReader();
  r.onload = function(e){
    try{
      var t = JSON.parse(e.target.result);
      fields = t.fields || [];
      uid = fields.reduce(function(m,f){return Math.max(m,f.id||0);},0);
      document.getElementById('cw').value = t.cw||150;
      document.getElementById('ch').value = t.ch||100;
      applySize();
      if(t.bg){
        var img=new Image();
        img.onload=function(){bgImg=img;drawBg();};
        img.src=t.bg;
      }
      selId = null;
      document.getElementById('props').classList.add('off');
      renderList(); renderOl();
    }catch(err){ alert('Ошибка загрузки шаблона'); }
  };
  r.readAsText(input.files[0]);
}

// ── INIT ─────────────────────────────────────────────
applySize();
initFields();

// Load order data if opened from panel
(function(){
  try{
    var raw = sessionStorage.getItem('labelOrderData');
    if(!raw) return;
    var d = JSON.parse(raw);
    if(d.sender) document.getElementById('pv-sender').value = d.sender;
    if(d.name)   document.getElementById('pv-name').value   = d.name;
    if(d.phone)  document.getElementById('pv-phone').value  = d.phone;
    if(d.address)document.getElementById('pv-addr').value   = d.address;
    if(d.order)  document.getElementById('pv-ord').value    = d.order;
    sessionStorage.removeItem('labelOrderData');
    renderOl();
  }catch(e){}
})();
</script>
</body>
</html>
